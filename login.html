<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuditMind — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --navy:#0B1120; --gold:#B8922A; --gold2:#D4AE58; --goldp:#F5EDD3; --grey:#5A6478; --greyl:#8D97A8; --red:#C0392B; --red-bg:#FDF0EF; }
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 55% 50% at 75% 25%,rgba(184,146,42,0.08) 0%,transparent 55%),radial-gradient(ellipse 45% 55% at 20% 75%,rgba(27,95,168,0.07) 0%,transparent 55%);}
.bg-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:56px 56px;}
.card{position:relative;z-index:10;background:#fff;border-radius:16px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.35);}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--greyl);text-decoration:none;margin-bottom:28px;transition:color 0.2s;}
.back:hover{color:var(--gold);}
.back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
.logo-area{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;}
.logo-circle{width:64px;height:64px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.logo-area h2{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--navy);}
.logo-area span{font-size:11.5px;color:var(--greyl);margin-top:3px;}
.hint{background:var(--goldp);border:1px solid rgba(184,146,42,0.3);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--grey);margin-bottom:22px;display:flex;align-items:center;gap:8px;}
.hint svg{width:14px;height:14px;stroke:var(--gold);fill:none;flex-shrink:0;stroke-width:2;}
.error-box{display:none;background:var(--red-bg);border-left:3px solid var(--red);border-radius:0 6px 6px 0;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:18px;}
.field{margin-bottom:18px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--greyl);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:7px;}
.field input{width:100%;height:44px;border:1.5px solid rgba(11,17,32,0.12);border-radius:8px;padding:0 14px;font-size:15px;color:var(--navy);background:#FAFAF7;outline:none;font-family:'Outfit',sans-serif;transition:border-color 0.2s,box-shadow 0.2s;}
.field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,146,42,0.1);}
.btn-login{width:100%;height:46px;border:none;background:var(--navy);color:#fff;font-size:15px;font-weight:700;letter-spacing:0.04em;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;transition:background 0.2s;}
.btn-login:hover{background:#1a2a42;}
.quick{margin-top:20px;border-top:1px solid rgba(11,17,32,0.08);padding-top:18px;}
.quick p{font-size:10.5px;font-weight:700;color:var(--greyl);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;}
.quick-btn{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:7px;background:#FAFAF7;border:1px solid rgba(11,17,32,0.07);cursor:pointer;transition:background 0.15s;width:100%;font-family:'Outfit',sans-serif;}
.quick-btn:hover{background:var(--goldp);}
.quick-btn span{font-size:13px;font-weight:600;color:var(--navy);}
.quick-btn em{font-size:11px;font-style:normal;color:var(--greyl);background:rgba(11,17,32,0.06);padding:3px 8px;border-radius:3px;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-grid"></div>
<div class="card">
  <a href="Home.html" class="back">
    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Back to website
  </a>
  <div class="logo-area">
    <div class="logo-circle">
      <svg width="36" height="36" viewBox="0 0 120 120">
        <defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#C9A84C"/><stop offset="100%" stop-color="#E8C97A"/></linearGradient></defs>
        <polygon points="60,22 93,41 93,79 60,98 27,79 27,41" fill="none" stroke="url(#lg)" stroke-width="2.5" stroke-opacity=".9"/>
        <line x1="60" y1="32" x2="38" y2="84" stroke="url(#lg)" stroke-width="8" stroke-linecap="round"/>
        <line x1="60" y1="32" x2="82" y2="84" stroke="url(#lg)" stroke-width="8" stroke-linecap="round"/>
        <line x1="44" y1="66" x2="76" y2="66" stroke="url(#lg)" stroke-width="6" stroke-linecap="round"/>
        <circle cx="60" cy="32" r="5" fill="#E8C97A"/>
      </svg>
    </div>
    <h2>AuditMind Intelligence Ltd</h2>
    <span>Secure Platform Access</span>
  </div>
  <div class="hint">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01" stroke-linecap="round"/></svg>
    Demo credentials: <strong>&nbsp;admin&nbsp;</strong> / <strong>&nbsp;secure123</strong>
  </div>
  <div class="error-box" id="error-box">Invalid username or password. Please try again.</div>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
  </div>
  <button class="btn-login" onclick="doLogin()">Sign In</button>
  <div class="quick">
    <p>Quick sign in</p>
    <button class="quick-btn" onclick="quickLogin('admin','secure123')">
      <span>admin</span><em>Administrator</em>
    </button>
  </div>
</div>
<script>
// Credentials must match main.py VALID_USERS
const USERS = { 'admin': 'secure123' };

function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  const err = document.getElementById('error-box');
  if (USERS[u] && USERS[u] === p) {
    err.style.display = 'none';
    sessionStorage.setItem('am_auth', 'true');
    sessionStorage.setItem('am_user', u);
    window.location.href = 'upload.html';
  } else {
    err.style.display = 'block';
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
  }
}
function quickLogin(u, p) {
  document.getElementById('username').value = u;
  document.getElementById('password').value = p;
  doLogin();
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
